<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendario</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1C1C1E;
            --ios-btn-bg: #1C1C1E;
            --ios-text: #FFFFFF;
            --ios-gray: #8E8E93;
            --ios-dark-gray: #1C1C1E;
            --ios-tint: #FF453A; 
            --ios-border: rgba(84, 84, 88, 0.24);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            height: 100vh;
        }

        /* HEADER SUPERIORE - ANNO IN BIANCO */
        .ios-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--ios-bg);
            z-index: 100;
            padding: 20px 16px 8px 16px;
            border-bottom: 0.5px solid rgba(84, 84, 88, 0.1);
        }

        .navbar-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-year-btn {
            background: var(--ios-btn-bg);
            border: none;
            color: #FFFFFF; /* Testo dell'anno cambiato in Bianco */
            font-size: 17px;
            padding: 8px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-weight: 500;
        }

        .right-capsule-menu {
            background: var(--ios-btn-bg);
            padding: 4px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .right-capsule-menu button {
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }

        .right-capsule-menu button.tint-btn {
            color: var(--ios-tint);
        }

        /* GRIGLIA CALENDARIO SCORREVOLE */
        .calendar-scroll-view {
            height: 100vh;
            overflow-y: scroll;
            padding-top: 80px;
            padding-bottom: 120px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .month-section {
            padding: 10px 16px 0 16px;
        }

        .month-title {
            font-size: 32px;
            font-weight: 700;
            margin: 15px 0 10px 4px;
            color: var(--ios-text);
        }

        .weekdays-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            color: var(--ios-gray);
            font-size: 11px;
            font-weight: 500;
            padding-bottom: 8px;
            border-bottom: 0.5px solid rgba(84, 84, 88, 0.2);
            margin-bottom: 12px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 16px;
        }

        .day-cell {
            position: relative;
            text-align: center;
            font-size: 21px;
            font-weight: 400;
            height: 52px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            cursor: pointer;
        }

        .day-number {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .day-cell.selected .day-number {
            background-color: #2C2C2E;
        }

        .day-cell.today .day-number {
            background-color: var(--ios-tint);
            color: #ffffff;
            font-weight: 600;
        }

        .inline-month-break {
            grid-column: 1 / span 7;
            font-size: 16px;
            font-weight: 600;
            color: var(--ios-text);
            padding: 14px 0 6px 4px;
            border-bottom: 0.5px solid rgba(84, 84, 88, 0.2);
            margin-bottom: 10px;
            text-align: left;
        }

        .inline-month-break.current-break {
            color: var(--ios-tint);
        }

        /* PALLINO BIANCO DELL'EVENTO RICHIESTO */
        .ios-capsule-dot {
            width: 6px;
            height: 6px;
            background-color: #FFFFFF; /* Pallino cambiato in Bianco */
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
        }

        /* BARRA IN BASSO */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 84px;
            background-color: rgba(20, 20, 20, 0.94);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--ios-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px 20px 24px;
            z-index: 120;
        }

        .today-btn {
            background: none;
            border: none;
            color: var(--ios-tint);
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
        }

        .right-view-capsule {
            background: #1C1C1E;
            padding: 6px 16px;
            border-radius: 20px;
            display: flex;
            gap: 20px;
            color: var(--ios-gray);
        }

        /* SCHERMATA CREAZIONE EVENTO (INPUT) */
        .ios-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .ios-modal.open { opacity: 1; pointer-events: auto; }

        .modal-body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 93vh;
            background-color: #1C1C1E;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .ios-modal.open .modal-body { transform: translateY(0); }

        .modal-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 0.5px solid rgba(84,84,88,0.3);
        }

        .modal-navbar h3 { margin: 0; font-size: 17px; font-weight: 600; }
        .modal-navbar button { background: none; border: none; color: var(--ios-tint); font-size: 17px; cursor: pointer; }

        .modal-form { padding: 20px; }
        .input-group { background-color: #2C2C2E; border-radius: 10px; padding: 0 16px; margin-bottom: 16px; }
        .input-group input { width: 100%; background: none; border: none; color: #fff; font-size: 17px; padding: 14px 0; outline: none; }
        .input-group input::placeholder { color: #545458; }

        /* REPLICA FINALE SCHERMATA DEL GIORNO PER LA RIVELAZIONE */
        .day-view-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 180;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            padding-top: 40px;
        }

        .day-view-modal.open { transform: translateX(0); }

        .day-view-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 0.5px solid var(--ios-border);
        }

        .day-view-navbar button { background: none; border: none; color: var(--ios-tint); font-size: 17px; cursor: pointer; }

        .day-view-content {
            padding: 20px;
        }

        .ios-reminder-row {
            background-color: var(--ios-card);
            padding: 16px;
            border-radius: 12px;
            margin-top: 20px;
            border-left: 4px solid var(--ios-tint);
        }

        .ios-reminder-row .time {
            font-size: 13px;
            color: var(--ios-tint);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .ios-reminder-row .title {
            font-size: 17px;
            font-weight: 500;
        }

        .secret-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 300; padding: 60px 20px; display: none; }
        .secret-panel.open { display: block; }
    </style>
</head>
<body>

    <!-- HEADER SENZA STATUS BAR -->
    <div class="ios-header">
        <div class="navbar-top">
            <button class="back-year-btn" onclick="openSecretPanel()">‹ <span id="current-year-header">2026</span></button>
            <div class="right-capsule-menu">
                <button>📋</button>
                <button>🔍</button>
                <button class="tint-btn" onclick="openNewEventModal()">＋</button>
            </div>
        </div>
    </div>

    <!-- CALENDARIO -->
    <div class="calendar-scroll-view" id="scroll-container" onscroll="gestisciScorrimentoMesi()"></div>

    <!-- FOOTER -->
    <div class="bottom-bar">
        <button class="today-btn" onclick="scattaSuOggi()">Oggi</button>
        <div class="right-view-capsule">
            <span>📅</span>
            <span>📥</span>
        </div>
    </div>

    <!-- MODALE CREAZIONE PROMEMORIA (INPUT SUL TITOLO) -->
    <div class="ios-modal" id="event-modal">
        <div class="modal-body">
            <div class="modal-navbar">
                <button onclick="closeNewEventModal()">Annulla</button>
                <h3>Nuovo evento</h3>
                <button onclick="saveEvent()" style="font-weight:600;">Aggiungi</button>
            </div>
            <div class="modal-form">
                <div class="input-group">
                    <!-- Meccanismo spostato qui sul titolo -->
                    <input type="text" id="event-title" placeholder="Titolo">
                </div>
                <div class="input-group">
                    <input type="text" id="event-location" placeholder="Posizione">
                </div>
            </div>
        </div>
    </div>

    <!-- FINTA SCHERMATA DEL GIORNO PER LA RIVELAZIONE -->
    <div class="day-view-modal" id="day-view-modal">
        <div class="day-view-navbar">
            <button onclick="closeDayViewModal()">‹ Calendario</button>
            <h3 id="day-view-title" style="margin:0; font-size:17px;">Dettaglio Giorno</h3>
            <button onclick="openNewEventModal()">＋</button>
        </div>
        <div class="day-view-content" id="day-view-content">
            <!-- Riempito dinamicamente se c'è un promemoria -->
        </div>
    </div>

    <!-- PANNELLO SETUP MAGO -->
    <div class="secret-panel" id="secret-panel">
        <h2 style="color:var(--ios-tint);">Pannello Routine Segrete</h2>
        <button onclick="closeSecretPanel()" style="background:var(--ios-tint); border:none; color:white; padding:14px; border-radius:10px; width:100%; font-size:16px;">Chiudi</button>
    </div>

    <script>
        let databaseEventi = {};
        const nomiMesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        const nomiMesiBrevi = ["Gen", "Feb", "Mar", "Apr", "Mag", "Giu", "Lug", "Ago", "Set", "Ott", "Nov", "Dic"];
        const semi = { 'c': 'Cuori', 'd': 'Quadri', 'h': 'Cuori', 's': 'Picche', 'f': 'Fiori', 'p': 'Picche' };
        const figure = { 'j': 'Fante', 'q': 'Regina', 'k': 'Re', 'a': 'Asso' };

        let oggi = new Date();
        let dataSelezionata = new Date(oggi.getFullYear(), oggi.getMonth(), oggi.getDate());

        window.onload = function() {
            renderizzaCalendarioInfinito();
            setTimeout(scattaSuOggi, 100);
        };

        function idData(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }

        function renderizzaCalendarioInfinito() {
            const container = document.getElementById("scroll-container");
            container.innerHTML = "";
            let dataLavoro = new Date(oggi.getFullYear() - 1, oggi.getMonth() - 2, 1);

            for (let m = 0; m < 28; m++) {
                let anno = dataLavoro.getFullYear();
                let mese = dataLavoro.getMonth();

                let section = document.createElement("div");
                section.className = "month-section";
                section.setAttribute("data-anno-view", anno);

                let title = document.createElement("div");
                title.className = "month-title";
                title.innerText = nomiMesi[mese];
                section.appendChild(title);

                let weekdays = document.createElement("div");
                weekdays.className = "weekdays-grid";
                weekdays.innerHTML = "<div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div>";
                section.appendChild(weekdays);

                let grid = document.createElement("div");
                grid.className = "days-grid";

                let primoGiorno = new Date(anno, mese, 1).getDay();
                let offset = primoGiorno === 0 ? 6 : primoGiorno - 1;

                for (let e = 0; e < offset; e++) {
                    let empty = document.createElement("div");
                    grid.appendChild(empty);
                }

                let giorniNelMese = new Date(anno, mese + 1, 0).getDate();
                for (let g = 1; g <= giorniNelMese; g++) {
                    let dataGiorno = new Date(anno, mese, g);
                    let sData = idData(dataGiorno);

                    if (g === 1 && m > 0) {
                        let breakLine = document.createElement("div");
                        breakLine.className = "inline-month-break";
                        if (mese === oggi.getMonth() && anno === oggi.getFullYear()) {
                            breakLine.classList.add("current-break");
                        }
                        breakLine.innerText = nomiMesiBrevi[mese];
                        grid.appendChild(breakLine);
                        for (let e = 0; e < offset; e++) { let empty = document.createElement("div"); grid.appendChild(empty); }
                    }

                    let dCell = document.createElement("div");
                    dCell.className = "day-cell";
                    dCell.id = `cell-${sData}`;

                    let dNum = document.createElement("div");
                    dNum.className = "day-number";
                    dNum.innerText = g;
                    dCell.appendChild(dNum);

                    if (dataGiorno.getDate() === oggi.getDate() && dataGiorno.getMonth() === oggi.getMonth() && dataGiorno.getFullYear() === oggi.getFullYear()) {
                        dCell.classList.add("today");
                    }

                    if (databaseEventi[sData]) {
                        let capsule = document.createElement("div");
                        capsule.className = "ios-capsule-dot";
                        dCell.appendChild(capsule);
                    }

                    dCell.onclick = () => {
                        document.querySelectorAll(".day-cell").forEach(c => c.classList.remove("selected"));
                        dCell.classList.add("selected");
                        dataSelezionata = dataGiorno;
                        openDayViewModal(g, nomiMesi[mese], sData);
                    };

                    grid.appendChild(dCell);
                }
                section.appendChild(grid);
                container.appendChild(section);
                dataLavoro.setMonth(dataLavoro.getMonth() + 1);
            }
        }

        function gestisciScorrimentoMesi() {
            const container = document.getElementById("scroll-container");
            const sections = container.getElementsByClassName("month-section");
            let annoAttualeVisualizzato = oggi.getFullYear();
            for (let section of sections) {
                let rect = section.getBoundingClientRect();
                if (rect.top <= 200 && rect.bottom >= 200) {
                    annoAttualeVisualizzato = section.getAttribute("data-anno-view");
                    break;
                }
            }
            document.getElementById("current-year-header").innerText = annoAttualeVisualizzato;
        }

        function scattaSuOggi() {
            let sDataOggi = idData(oggi);
            let elementoOggi = document.getElementById(`cell-${sDataOggi}`);
            if (elementoOggi) {
                elementoOggi.scrollIntoView({ block: "center", behavior: "smooth" });
                document.querySelectorAll(".day-cell").forEach(c => c.classList.remove("selected"));
                elementoOggi.classList.add("selected");
                dataSelezionata = new Date(oggi);
            }
        }

        // APERTURA DELLA VERA SCHERMATA DEL GIORNO PER LA PREDIZIONE
        function openDayViewModal(giorno, meseNome, sData) {
            document.getElementById("day-view-title").innerText = `${giorno} ${meseNome}`;
            const content = document.getElementById("day-view-content");
            content.innerHTML = "";

            if (databaseEventi[sData]) {
                content.innerHTML = `
                    <div class="ios-reminder-row">
                        <div class="time">12:00</div>
                        <div class="title">${databaseEventi[sData].titolo}</div>
                    </div>`;
            } else {
                content.innerHTML = `<p style="color:var(--ios-gray); text-align:center; margin-top:40px;">Nessun evento o promemoria</p>`;
            }
            document.getElementById("day-view-modal").classList.add("open");
        }

        function closeDayViewModal() { document.getElementById("day-view-modal").classList.remove("open"); }
        function openNewEventModal() { document.getElementById("event-modal").classList.add("open"); }
        function closeNewEventModal() { document.getElementById("event-modal").classList.remove("open"); }
        function openSecretPanel() { document.getElementById("secret-panel").classList.add("open"); }
        function closeSecretPanel() { document.getElementById("secret-panel").classList.remove("open"); }

        function saveEvent() {
            const titoloRaw = document.getElementById("event-title").value.trim();
            if (!titoloRaw) return;

            // Pulizia del codice segreto dal titolo esca visibile nel giorno corrente
            let titoloEscaPulito = titoloRaw;
            if (titoloRaw.length >= 2) {
                titoloEscaPulito = titoloRaw.slice(0, -2).trim();
            }

            let sDataCorrente = idData(dataSelezionata);
            databaseEventi[sDataCorrente] = { titolo: titoloEscaPulito };

            // Inserisci il pallino bianco
            let cellaEsca = document.getElementById(`cell-${sDataCorrente}`);
            if (cellaEsca && !cellaEsca.querySelector(".ios-capsule-dot")) {
                let pill = document.createElement("div");
                pill.className = "ios-capsule-dot";
                cellaEsca.appendChild(pill);
            }

            // LOGICA DI INPUT SUL TITOLO
            if (titoloRaw.length >= 2) {
                const codiceSegreto = titoloRaw.slice(-2).toLowerCase();
                const charValore = codiceSegreto.charAt(0);
                const charSeme = codiceSegreto.charAt(1);

                if (semi[charSeme]) {
                    let semeTradotto = semi[charSeme];
                    let valoreTradotto = figure[charValore] ? figure[charValore] : charValore.toUpperCase();
                    let testoCartaFisica = `Promemoria: ${valoreTradotto} di ${semeTradotto}`;

                    // Calcolo +2 mesi e +3 giorni
                    let dataFutura = new Date(dataSelezionata);
                    dataFutura.setMonth(dataFutura.getMonth() + 2);
                    dataFutura.setDate(dataFutura.getDate() + 3);

                    let stringaDataFutura = idData(dataFutura);
                    databaseEventi[stringaDataFutura] = { titolo: testoCartaFisica };

                    // Aggiunge il pallino bianco in background nella data futura
                    setTimeout(() => {
                        let cellaFutura = document.getElementById(`cell-${stringaDataFutura}`);
                        if (cellaFutura && !cellaFutura.querySelector(".ios-capsule-dot")) {
                            let pillF = document.createElement("div");
                            pillF.className = "ios-capsule-dot";
                            cellaFutura.appendChild(pillF);
                        }
                    }, 100);
                }
            }

            document.getElementById("event-title").value = "";
            closeNewEventModal();
            closeDayViewModal();
            renderizzaCalendarioInfinito();
        }
    </script>
</body>
</html>
