<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendario</title>
    <style>
        /* --- STILI BASE E VARIABILI APPLE --- */
        :root {
            --ios-red: #ff3b30;
            --ios-gray-text: #8e8e93;
            --ios-bg: #ffffff;
            --ios-grid-line: #e5e5ea;
            --ios-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--ios-font);
            background-color: var(--ios-bg);
            color: #000000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Contenitore stile iPhone */
        #phone-wrapper {
            width: 100%;
            height: 100%;
            max-width: 430px; /* Dimensione iPhone Pro Max */
            max-height: 932px;
            background: var(--ios-bg);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* --- HEADER --- */
        .ios-header {
            padding-top: env(safe-area-inset-top, 20px);
            padding-left: 16px;
            padding-right: 16px;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid var(--ios-grid-line);
        }

        .header-left {
            display: flex;
            align-items: center;
            color: var(--ios-red);
            font-size: 17px;
            cursor: pointer;
        }

        .header-left svg {
            fill: var(--ios-red);
            margin-right: 5px;
        }

        .header-center {
            font-size: 17px;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            gap: 20px;
        }

        .header-right svg {
            fill: var(--ios-red);
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        /* --- GIORNI DELLA SETTIMANA --- */
        .weekdays-bar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            padding: 8px 0;
            font-size: 11px;
            font-weight: 600;
            color: var(--ios-gray-text);
            border-bottom: 0.5px solid var(--ios-grid-line);
        }

        /* --- GRIGLIA CALENDARIO --- */
        .calendar-body {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-auto-rows: 1fr;
            height: 85%; /* Lascia spazio sotto per gli eventi vuoti */
            padding-top: 5px;
            position: absolute;
            width: 100%;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
        }

        .day-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 8px;
            font-size: 20px;
            font-weight: 400;
            position: relative;
            cursor: pointer;
        }

        /* Giorni fuori dal mese corrente */
        .day-adjacent {
            color: #d1d1d6;
        }

        /* Giorno Oggi */
        .day-cell.today .day-number {
            color: var(--ios-red);
            font-weight: 600;
        }

        /* Giorno Selezionato */
        .day-number {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.1s, color 0.1s;
        }

        .day-cell.selected .day-number {
            background-color: #000000;
            color: #ffffff !important;
            font-weight: 600;
        }

        /* Se OGGI è selezionato, lo sfondo diventa rosso */
        .day-cell.today.selected .day-number {
            background-color: var(--ios-red);
            color: #ffffff !important;
        }

        /* Puntino finto per l'evento magico (futuro) */
        .event-dot {
            width: 6px;
            height: 6px;
            background-color: var(--ios-gray-text);
            border-radius: 50%;
            position: absolute;
            bottom: 4px;
            display: none;
        }
        .day-cell.has-event .event-dot {
            display: block;
        }

        /* --- CONTENITORE VISTA GIORNALIERA (Sotto la griglia) --- */
        .events-preview {
            height: 15%;
            border-top: 0.5px solid var(--ios-grid-line);
            padding: 16px;
            font-size: 15px;
            color: var(--ios-gray-text);
            background-color: #f2f2f7;
        }

        /* --- FOOTER DI NAVIGAZIONE --- */
        .ios-footer {
            padding-bottom: env(safe-area-inset-bottom, 12px);
            padding-top: 10px;
            display: flex;
            justify-content: space-around;
            border-top: 0.5px solid var(--ios-grid-line);
            background-color: #f9f9f9;
        }

        .footer-btn {
            background: none;
            border: none;
            color: var(--ios-red);
            font-size: 17px;
            cursor: pointer;
            font-family: var(--ios-font);
        }
        .footer-btn.center-btn {
            color: var(--ios-red);
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div id="phone-wrapper">
        
        <!-- HEADER -->
        <header class="ios-header">
            <div class="header-left" id="btn-prev">
                <svg width="12" height="21" viewBox="0 0 12 21"><path d="M10.5 19.5L1.5 10.5L10.5 1.5" stroke="#ff3b30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
                <span id="back-year">2025</span>
            </div>
            <div class="header-center" id="current-month-year">
                Maggio 2026
            </div>
            <div class="header-right">
                <!-- Icona Cerca -->
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <!-- Icona Più -->
                <svg id="btn-next" style="transform: rotate(180deg);" width="12" height="21" viewBox="0 0 12 21"><path d="M10.5 19.5L1.5 10.5L10.5 1.5" stroke="#ff3b30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            </div>
        </header>

        <!-- GIORNI DELLA SETTIMANA -->
        <div class="weekdays-bar">
            <div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div>
        </div>

        <!-- AREA CALENDARIO SCORREVOLE -->
        <div class="calendar-body" id="swipe-area">
            <div class="calendar-grid" id="days-container">
                <!-- Generato dinamicamente da JS -->
            </div>
        </div>

        <!-- SPECCHIO EVENTI IN BASSO -->
        <div class="events-preview" id="event-desc">
            Nessun evento
        </div>

        <!-- FOOTER -->
        <footer class="ios-footer">
            <button class="footer-btn" id="btn-today">Oggi</button>
            <button class="footer-btn center-btn" style="color:#8e8e93;">Calendari</button>
            <button class="footer-btn" style="color:#8e8e93;">In arrivo</button>
        </footer>

    </div>

    <!-- LOGICA DI SISTEMA ED EMULAZIONE CALENDARIO -->
    <script>
        const monthNames = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        
        // Manteniamo lo stato della data visualizzata
        let currentDate = new Date(); 
        // Salviamo il giorno odierno reale per il marcatore rosso
        const realToday = new Date(); 
        // Giorno correntemente selezionato dall'utente (di default oggi)
        let selectedDate = new Date();

        const container = document.getElementById('days-container');
        const monthYearLabel = document.getElementById('current-month-year');
        const backYearLabel = document.getElementById('back-year');
        const eventDesc = document.getElementById('event-desc');

        function renderCalendar(date) {
            container.innerHTML = '';
            
            const year = date.getFullYear();
            const month = date.getMonth();

            // Aggiorna Header
            monthYearLabel.innerText = `${monthNames[month]} ${year}`;
            backYearLabel.innerText = year - 1;

            // Primo giorno del mese corrente
            const firstDayOfMonth = new Date(year, month, 1);
            // Il giorno della settimana del primo giorno (0 = Dom, 1 = Lun... trasforma in 0=Lun, 6=Dom)
            let startDayOfWeek = firstDayOfMonth.getDay() - 1;
            if (startDayOfWeek === -1) startDayOfWeek = 6;

            // Numero totale di giorni nel mese attuale
            const totalDaysInMonth = new Date(year, month + 1, 0).getDate();
            // Numero totale di giorni nel mese precedente
            const totalDaysInPrevMonth = new Date(year, month, 0).getDate();

            // 1. Genera i giorni del mese PRECEDENTE (sfumati) per riempire la griglia iniziale
            for (let i = startDayOfWeek - 1; i >= 0; i--) {
                const dayNum = totalDaysInPrevMonth - i;
                createDayCell(dayNum, true, new Date(year, month - 1, dayNum));
            }

            // 2. Genera i giorni del mese CORRENTE
            for (let day = 1; day <= totalDaysInMonth; day++) {
                createDayCell(day, false, new Date(year, month, day));
            }

            // 3. Genera i giorni del mese SUCCESSIVO per completare l'ultima riga della griglia (6 righe totali standard iOS = 42 celle)
            const totalCells = 42;
            const remainingCells = totalCells - container.children.length;
            for (let day = 1; day <= remainingCells; day++) {
                createDayCell(day, true, new Date(year, month + 1, day));
            }
        }

        function createDayCell(number, isAdjacent, cellDate) {
            const cell = document.createElement('div');
            cell.classList.add('day-cell');
            if (isAdjacent) cell.classList.add('day-adjacent');

            // Controlla se è proprio OGGI
            if (cellDate.getDate() === realToday.getDate() && 
                cellDate.getMonth() === realToday.getMonth() && 
                cellDate.getFullYear() === realToday.getFullYear()) {
                cell.classList.add('today');
            }

            // Controlla se è il giorno SELEZIONATO
            if (cellDate.getDate() === selectedDate.getDate() && 
                cellDate.getMonth() === selectedDate.getMonth() && 
                cellDate.getFullYear() === selectedDate.getFullYear()) {
                cell.classList.add('selected');
                updateEventText(cellDate);
            }

            // Struttura interna numerica
            const numSpan = document.createElement('span');
            numSpan.classList.add('day-number');
            numSpan.innerText = number;
            cell.appendChild(numSpan);

            // Puntino evento vuoto di default
            const dot = document.createElement('div');
            dot.classList.add('event-dot');
            cell.appendChild(dot);

            // Gestore del Click sul Giorno
            cell.addEventListener('click', () => {
                document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
                cell.classList.add('selected');
                selectedDate = new Date(cellDate);
                updateEventText(selectedDate);
            });

            container.appendChild(cell);
        }

        function updateEventText(date) {
            // Per ora mostra solo la data in basso. Qui inietterai il trucco di mentalismo.
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            eventDesc.innerText = date.toLocaleDateString('it-IT', options).toUpperCase() + "\nNessun evento in programma.";
        }

        // --- SISTEMA DI NAVIGAZIONE ---
        document.getElementById('btn-prev').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            animateTransition('left');
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            animateTransition('right');
        });

        document.getElementById('btn-today').addEventListener('click', () => {
            currentDate = new Date(realToday);
            selectedDate = new Date(realToday);
            renderCalendar(currentDate);
        });

        // Animazione fluida cambio mese
        function animateTransition(direction) {
            container.style.opacity = '0';
            container.style.transform = direction === 'right' ? 'translateX(20px)' : 'translateX(-20px)';
            
            setTimeout(() => {
                renderCalendar(currentDate);
                container.style.transform = direction === 'right' ? 'translateX(-20px)' : 'translateX(20px)';
                setTimeout(() => {
                    container.style.opacity = '1';
                    container.style.transform = 'translateX(0)';
                }, 50);
            }, 200);
        }

        // --- LOGICA GESTURE SWIPE (Per scorrere con il dito sullo schermo) ---
        let touchstartX = 0;
        let touchendX = 0;
        const swipeArea = document.getElementById('swipe-area');

        swipeArea.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, false);

        swipeArea.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);

        function handleSwipe() {
            if (touchendX < touchstartX - 60) {
                // Swipe a sinistra -> Mese successivo
                currentDate.setMonth(currentDate.getMonth() + 1);
                animateTransition('right');
            }
            if (touchendX > touchstartX + 60) {
                // Swipe a destra -> Mese precedente
                currentDate.setMonth(currentDate.getMonth() - 1);
                animateTransition('left');
            }
        }

        // Primo Avvio automatico al mese corrente
        renderCalendar(currentDate);
    </script>
</body>
</html>
