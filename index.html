<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendario</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1C1C1E;
            --ios-card-bg: #2C2C2E;
            --ios-text: #FFFFFF;
            --ios-gray: #8E8E93;
            --ios-tint: #FF453A; 
            --ios-border: #222224;
            --ios-today: #FF453A;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            height: 100vh;
        }

        /* HEADER FISSO iOS */
        .ios-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            padding-top: env(safe-area-inset-top, 20px);
            border-bottom: 0.5px solid var(--ios-border);
        }

        .navbar-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
        }

        .navbar-top .left-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .navbar-top button {
            background: none;
            border: none;
            color: var(--ios-tint);
            font-size: 17px;
            cursor: pointer;
            padding: 0;
        }

        .navbar-top button.grid-icon {
            font-size: 20px;
        }

        .weekdays-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            color: var(--ios-gray);
            font-size: 10px;
            font-weight: 600;
            padding-bottom: 6px;
            text-transform: uppercase;
        }

        /* CONTENITORE SCORRIMENTO VERTICALE INFINITO */
        .calendar-scroll-view {
            height: 100vh;
            overflow-y: scroll;
            padding-top: calc(85px + env(safe-area-inset-top, 20px));
            padding-bottom: 100px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .month-section {
            padding: 0 12px 25px 12px;
        }

        .month-title {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 12px 8px;
            color: var(--ios-text);
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 14px;
        }

        .day-cell {
            position: relative;
            text-align: center;
            font-size: 19px;
            font-weight: 400;
            height: 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .day-number {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .day-cell.selected .day-number {
            background-color: #333335;
        }

        .day-cell.today .day-number {
            background-color: var(--ios-today);
            color: #fff;
            font-weight: 600;
        }

        /* Pallino evento sotto il numero */
        .ios-dot {
            width: 6px;
            height: 6px;
            background-color: var(--ios-gray);
            border-radius: 50%;
            position: absolute;
            bottom: -2px;
        }

        .day-cell.today .ios-dot {
            background-color: #fff;
        }

        /* LISTA EVENTI IN BASSO STILE iOS 26 */
        .events-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30vh;
            background-color: var(--ios-bg);
            border-top: 0.5px solid var(--ios-border);
            padding: 16px;
            overflow-y: auto;
            z-index: 90;
        }

        .event-card {
            background-color: var(--ios-card);
            border-left: 4px solid var(--ios-tint);
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .event-card .time {
            font-size: 12px;
            color: var(--ios-tint);
            font-weight: 600;
            margin-bottom: 2px;
        }

        .event-card .title {
            font-size: 15px;
            font-weight: 500;
        }

        .no-events {
            color: var(--ios-gray);
            text-align: center;
            font-size: 15px;
            margin-top: 30px;
        }

        /* REPLICA SCHERMATA "NUOVO EVENTO" DI IPHONE */
        .ios-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--ios-bg);
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.15, 0.45, 0.05, 1);
            padding-top: env(safe-area-inset-top, 20px);
        }

        .ios-modal.open {
            transform: translateY(0);
        }

        .modal-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 0.5px solid var(--ios-border);
        }

        .modal-navbar h3 {
            margin: 0;
            font-size: 17px;
            font-weight: 600;
        }

        .modal-navbar button {
            background: none;
            border: none;
            color: var(--ios-tint);
            font-size: 17px;
            cursor: pointer;
        }

        .modal-form {
            padding: 18px 16px;
        }

        .input-group {
            background-color: var(--ios-card);
            border-radius: 10px;
            padding: 4px 16px;
            margin-bottom: 20px;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            background: none;
            border: none;
            color: #fff;
            font-size: 17px;
            padding: 12px 0;
            outline: none;
        }

        .input-group input::placeholder, .input-group textarea::placeholder {
            color: #48484A;
        }

        .input-group input {
            border-bottom: 0.5px solid var(--ios-border);
        }

        .input-group textarea {
            height: 100px;
            resize: none;
            font-family: inherit;
        }

        /* PANNELLO ROUTINE SEGRETE */
        .secret-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 300;
            padding: 40px 20px;
            display: none;
        }

        .secret-panel.open { display: block; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- NAVBAR FISSA SUPERIORE -->
    <div class="ios-header">
        <div class="navbar-top">
            <div class="left-actions">
                <button class="grid-icon" onclick="openSecretPanel()">☰</button>
                <button style="font-weight:600;">Oggi</button>
            </div>
            <button onclick="openNewEventModal()">＋</button>
        </div>
        <div class="weekdays-header">
            <div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div>
        </div>
    </div>

    <!-- VISTA CALENDARIO A SCORRIMENTO VERTICALE -->
    <div class="calendar-scroll-view" id="scroll-container" onscroll="handleScroll()">
        <!-- I mesi verranno generati dinamicamente via JS -->
    </div>

    <!-- PANNELLO DETTAGLIO EVENTI IN BASSO -->
    <div class="events-panel" id="events-panel">
        <div class="no-events">Nessun evento</div>
    </div>

    <!-- REPLICA SCHERMATA CREAZIONE EVENTO DI APPLE iOS -->
    <div class="ios-modal" id="event-modal">
        <div class="modal-navbar">
            <button onclick="closeNewEventModal()">Annulla</button>
            <h3>Nuovo evento</h3>
            <button onclick="saveEvent()" style="font-weight:600;">Aggiungi</button>
        </div>
        <div class="modal-form">
            <div class="input-group">
                <input type="text" id="event-title" placeholder="Titolo">
                <input type="text" id="event-location" placeholder="Posizione o videochiamata">
            </div>
            <div class="input-group">
                <textarea id="event-notes" placeholder="Note (Metti il codice della carta qui alla fine es. 6d)"></textarea>
            </div>
        </div>
    </div>

    <!-- SCHERMATA SEGRETA DELLE ROUTINE (ATTIVATA DA ☰) -->
    <div class="secret-panel" id="secret-panel">
        <h2 style="color:var(--ios-tint);">Pannello Magic Setup</h2>
        <p style="color:var(--ios-gray);">Configurazione delle routine dell'applicazione.</p>
        <div style="background:#1C1C1E; padding:15px; border-radius:10px; margin-top:20px;">
            <strong>Metodo Attivo:</strong><br>
            Note End-Hook input.<br>
            Algoritmo: +2 Mesi e +3 Giorni automatici.
        </div>
        <button onclick="closeSecretPanel()" style="background:var(--ios-tint); border:none; color:white; padding:12px 24px; border-radius:8px; margin-top:30px; font-size:16px; width:100%;">Chiudi Pannello</button>
    </div>

    <script>
        let databaseEventi = {};
        const nomiMesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        const semi = { 'c': 'Cuori', 'd': 'Quadri', 'h': 'Cuori', 's': 'Picche', 'f': 'Fiori', 'p': 'Picche' };
        const figure = { 'j': 'Fante', 'q': 'Regina', 'k': 'Re', 'a': 'Asso' };

        // Data corrente reale
        let oggi = new Date();
        let dataSelezionata = new Date(oggi.getFullYear(), oggi.getMonth(), oggi.getDate());
        let stringaGiornoSelezionato = idData(dataSelezionata);

        // Generiamo i mesi da visualizzare nello scorrimento (6 mesi prima e 12 mesi dopo oggi)
        let annoPartenza = oggi.getFullYear();
        let mesePartenza = oggi.getMonth() - 6;

        window.onload = function() {
            renderizzaMesiInfiniti();
            selezionaGiornoInInterfaccia(document.getElementById(`cell-${stringaGiornoSelezionato}`), dataSelezionata);
            aggiornaListaEventi();
        };

        function idData(d) {
            return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        }

        // CREAZIONE DELLO SCORRIMENTO VERTICALE STILE APPLE
        function renderizzaMesiInfiniti() {
            const container = document.getElementById("scroll-container");
            container.innerHTML = "";

            let dataLavoro = new Date(annoPartenza, mesePartenza, 1);

            // Genera 18 mesi totali da scorrere in verticale
            for (let m = 0; m < 18; m++) {
                let annoAttuale = dataLavoro.getFullYear();
                let meseAttuale = dataLavoro.getMonth();

                let section = document.createElement("div");
                section.className = "month-section";

                let title = document.createElement("div");
                title.className = "month-title";
                title.innerText = `${nomiMesi[meseAttuale]} ${annoAttuale}`;
                section.appendChild(title);

                let grid = document.createElement("div");
                grid.className = "days-grid";

                // Calcolo spaziatura primo giorno del mese (Lunedì=0, Domenica=6)
                let primoGiornoSettimana = new Date(annoAttuale, meseAttuale, 1).getDay();
                let offset = primoGiornoSettimana === 0 ? 6 : primoGiornoSettimana - 1;

                for (let e = 0; e < offset; e++) {
                    let empty = document.createElement("div");
                    grid.appendChild(empty);
                }

                // Genera i giorni effettivi del mese
                let giorniNelMese = new Date(annoAttuale, meseAttuale + 1, 0).getDate();
                for (let g = 1; g <= giorniNelMese; g++) {
                    let dCell = document.createElement("div");
                    dCell.className = "day-cell";
                    
                    let dataQuestoGiorno = new Date(annoAttuale, meseAttuale, g);
                    let sData = idData(dataQuestoGiorno);
                    dCell.id = `cell-${sData}`;

                    let dNum = document.createElement("div");
                    dNum.className = "day-number";
                    dNum.innerText = g;
                    dCell.appendChild(dNum);

                    // Controlla se è oggi
                    if (dataQuestoGiorno.getDate() === oggi.getDate() && dataQuestoGiorno.getMonth() === oggi.getMonth() && dataQuestoGiorno.getFullYear() === oggi.getFullYear()) {
                        dCell.classList.add("today");
                    }

                    // Click per selezionare il giorno
                    dCell.onclick = (e) => {
                        e.stopPropagation();
                        selezionaGiornoInInterfaccia(dCell, dataQuestoGiorno);
                    };

                    grid.appendChild(dCell);
                }

                section.appendChild(grid);
                container.appendChild(section);

                dataLavoro.setMonth(dataLavoro.getMonth() + 1);
            }
        }

        function selezionaGiornoInInterfaccia(elemento, dataOggetto) {
            document.querySelectorAll(".day-cell").forEach(c => c.classList.remove("selected"));
            if(elemento) elemento.classList.add("selected");
            
            dataSelezionata = new Date(dataOggetto);
            stringaGiornoSelezionato = idData(dataSelezionata);
            aggiornaListaEventi();
        }

        // AGGIORNA I PALLINI E LA LISTA IN BASSO
        function aggiornaListaEventi() {
            const panel = document.getElementById("events-panel");
            panel.innerHTML = "";

            if (databaseEventi[stringaGiornoSelezionato] && databaseEventi[stringaGiornoSelezionato].length > 0) {
                databaseEventi[stringaGiornoSelezionato].forEach(ev => {
                    let card = document.createElement("div");
                    card.className = "event-card";
                    card.innerHTML = `<div class="time">12:00</div><div class="title">${ev.titolo}</div>`;
                    panel.appendChild(card);
                });
            } else {
                panel.innerHTML = `<div class="no-events">Nessun evento</div>`;
            }

            // Aggiorna visivamente tutti i pallini del calendario
            document.querySelectorAll(".day-cell").forEach(cell => {
                let id = cell.id.replace("cell-", "");
                let dot = cell.querySelector(".ios-dot");
                if (databaseEventi[id] && databaseEventi[id].length > 0) {
                    if (!dot) {
                        let newDot = document.createElement("div");
                        newDot.className = "ios-dot";
                        cell.appendChild(newDot);
                    }
                } else {
                    if (dot) dot.remove();
                }
            });
        }

        // FUNZIONI APERTURA SCHERMATE
        function openNewEventModal() { document.getElementById("event-modal").classList.add("open"); }
        function closeNewEventModal() { document.getElementById("event-modal").classList.remove("open"); }
        function openSecretPanel() { document.getElementById("secret-panel").classList.add("open"); }
        function closeSecretPanel() { document.getElementById("secret-panel").classList.remove("open"); }
        function handleScroll() {}

        // LOGICA DI SALVATAGGIO + INPUT SEGRETO E CALCOLO MAGICO
        function saveEvent() {
            const titolo = document.getElementById("event-title").value.trim();
            const note = document.getElementById("event-notes").value.trim();

            if (!titolo) return;

            // 1. Salva l'evento esca visibile nel giorno selezionato (con le note originali incluse)
            if (!databaseEventi[stringaGiornoSelezionato]) databaseEventi[stringaGiornoSelezionato] = [];
            databaseEventi[stringaGiornoSelezionato].push({ titolo: titolo, note: note });

            // 2. Analizza le ultime due lettere del campo NOTE per trovare l'input segreto
            if (note.length >= 2) {
                const codiceSegreto = note.slice(-2).toLowerCase();
                const charValore = codiceSegreto.charAt(0);
                const charSeme = codiceSegreto.charAt(1);

                if (semi[charSeme]) {
                    let semeTradotto = semi[charSeme];
                    let valoreTradotto = figure[charValore] ? figure[charValore] : charValore.toUpperCase();
                    let testoCartaFisica = `Promemoria: ${valoreTradotto} di ${semeTradotto}`;

                    // 3. LOGICA CALCOLO DATA: +2 mesi e +3 giorni in avanti nel futuro
                    let dataFutura = new Date(dataSelezionata);
                    dataFutura.setMonth(dataFutura.getMonth() + 2);
                    dataFutura.setDate(dataFutura.getDate() + 3);

                    let stringaDataFutura = idData(dataFutura);

                    // 4. Salva in background l'evento pulito della carta nella data futura
                    if (!databaseEventi[stringaDataFutura]) databaseEventi[stringaDataFutura] = [];
                    databaseEventi[stringaDataFutura].push({ titolo: testoCartaFisica, note: "" });
                }
            }

            // Reset dei campi e chiusura modale stile iOS
            document.getElementById("event-title").value = "";
            document.getElementById("event-notes").value = "";
            closeNewEventModal();
            aggiornaListaEventi();
        }
    </script>
</body>
</html>
