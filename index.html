<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendario</title>
    <style>
        /* --- DESIGN DEFINTIVO IOS DARK MODE --- */
        :root {
            --ios-red: #ff453a; /* Rosso Dark Mode */
            --ios-gray-text: #8e8e93;
            --ios-dark-bg: #000000; /* Nero assoluto OLED */
            --ios-card-bg: #1c1c1e;
            --ios-grid-line: #2c2c2e;
            --ios-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--ios-font);
            background-color: #111;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Simulatore iPhone */
        #phone-wrapper {
            width: 100%;
            height: 100%;
            max-width: 430px;
            max-height: 932px;
            background: var(--ios-dark-bg);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }

        /* --- FINESTRA FISSA SUPERIORE (HEADER) --- */
        .ios-header {
            padding-top: env(safe-area-inset-top, 40px);
            padding-left: 16px;
            padding-right: 16px;
            padding-bottom: 5px;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            z-index: 10;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            color: var(--ios-red);
            font-size: 17px;
            font-weight: 400;
        }

        .header-left svg {
            fill: var(--ios-red);
            margin-right: 5px;
        }

        .header-right {
            display: flex;
            gap: 22px;
        }

        .header-right svg {
            fill: var(--ios-red);
            width: 22px;
            height: 22px;
        }

        /* Barra dei giorni (L M M G V S D) fissa in alto */
        .weekdays-bar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            padding-bottom: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--ios-gray-text);
            border-bottom: 0.5px solid var(--ios-grid-line);
        }

        /* --- FLUSSO DI SCORRIMENTO VERTICALE INFINITO --- */
        .scroll-container {
            flex: 1;
            overflow-y: scroll;
            scroll-behavior: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 100px;
        }

        /* Rimuove la barra di scorrimento visiva per farlo sembrare nativo */
        .scroll-container::-webkit-scrollbar {
            display: none;
        }

        /* Blocco del singolo Mese nel flusso */
        .month-block {
            padding: 15px 0 25px 0;
            border-bottom: 0.5px solid var(--ios-grid-line);
        }

        .month-title {
            font-size: 20px;
            font-weight: 700;
            padding-left: 20px;
            margin-bottom: 12px;
            color: #ffffff;
        }

        /* La griglia dei giorni interna al mese */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 14px;
            text-align: center;
        }

        .day-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 400;
            position: relative;
            height: 40px;
        }

        /* Celle vuote di riempimento iniziale */
        .day-empty {
            visibility: hidden;
        }

        .day-number {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        /* Oggi */
        .day-cell.today .day-number {
            color: var(--ios-red);
            font-weight: 600;
        }

        /* Giorno Selezionato */
        .day-cell.selected .day-number {
            background-color: #ffffff;
            color: #000000 !important;
            font-weight: 600;
        }

        /* Se oggi viene selezionato diventa un cerchio rosso pieno */
        .day-cell.today.selected .day-number {
            background-color: var(--ios-red);
            color: #ffffff !important;
        }

        /* Evento finto (puntino grigio sotto il numero) */
        .event-dot {
            width: 5px;
            height: 5px;
            background-color: var(--ios-gray-text);
            border-radius: 50%;
            position: absolute;
            bottom: -2px;
            display: none;
        }
        .day-cell.has-event .event-dot {
            display: block;
        }

        /* --- FINESTRA EVENTI IN BASSO --- */
        .events-preview {
            background-color: var(--ios-dark-bg);
            border-top: 0.5px solid var(--ios-grid-line);
            padding: 16px 20px;
            min-height: 90px;
            font-size: 13px;
            font-weight: 500;
            color: var(--ios-gray-text);
            z-index: 10;
        }
        .event-time-line {
            color: #ffffff;
            font-size: 15px;
            margin-top: 4px;
            font-weight: 400;
        }

        /* --- FOOTER FISSO --- */
        .ios-footer {
            padding-bottom: env(safe-area-inset-bottom, 20px);
            padding-top: 12px;
            display: flex;
            justify-content: space-around;
            border-top: 0.5px solid var(--ios-grid-line);
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10;
        }

        .footer-btn {
            background: none;
            border: none;
            color: var(--ios-red);
            font-size: 17px;
            font-family: var(--ios-font);
        }
    </style>
</head>
<body>

    <div id="phone-wrapper">
        
        <!-- HEADER FISSO -->
        <header class="ios-header">
            <div class="header-top">
                <div class="header-left">
                    <svg width="12" height="21" viewBox="0 0 12 21"><path d="M10.5 19.5L1.5 10.5L10.5 1.5" stroke="#ff453a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
                    <span id="label-year">2026</span>
                </div>
                <div class="header-right">
                    <!-- Icona Cerca -->
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <!-- Icona Più -->
                    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </div>
            </div>
            <!-- Settimana fissa -->
            <div class="weekdays-bar">
                <div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div>
            </div>
        </header>

        <!-- AREA DI SCORRIMENTO VERTICALE CONTINUO -->
        <div class="scroll-container" id="scroll-area">
            <!-- I blocchi dei mesi verranno inseriti dinamicamente qui -->
        </div>

        <!-- ANTEPRIMA EVENTI IN BASSO -->
        <div class="events-preview" id="event-box">
            NESSUN EVENTO
        </div>

        <!-- FOOTER FISSO -->
        <footer class="ios-footer">
            <button class="footer-btn" id="btn-today" style="font-weight: 600;">Oggi</button>
            <button class="footer-btn" style="color:#3a3a3c;">Calendari</button>
            <button class="footer-btn" style="color:#3a3a3c;">In arrivo</button>
        </footer>

    </div>

    <script>
        const monthNames = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        const scrollArea = document.getElementById('scroll-area');
        const labelYear = document.getElementById('label-year');
        const eventBox = document.getElementById('event-box');

        const realToday = new Date();
        let selectedDate = new Date(realToday);

        // Carichiamo un raggio di mesi iniziale intorno alla data corrente
        let startYear = realToday.getFullYear() - 1;
        let startMonth = 0; // Gennaio anno scorso
        let totalMonthsToRender = 36; // 3 anni di mesi totali pre-renderizzati

        function initCalendar() {
            let currentY = startYear;
            let currentM = startMonth;

            for (let i = 0; i < totalMonthsToRender; i++) {
                renderMonthBlock(currentY, currentM);
                currentM++;
                if (currentM > 11) {
                    currentM = 0;
                    currentY++;
                }
            }

            // Riposiziona lo scroll automatico sul mese corrente all'avvio
            setTimeout(() => {
                const todayBlock = document.getElementById(`month-${realToday.getFullYear()}-${realToday.getMonth()}`);
                if (todayBlock) {
                    todayBlock.scrollIntoView({ block: 'start' });
                    // Regola leggermente lo scroll per compensare l'header fisso
                    scrollArea.scrollTop -= 10;
                }
            }, 100);

            updateEventText(selectedDate);
        }

        function renderMonthBlock(year, month) {
            const monthBlock = document.createElement('div');
            monthBlock.classList.add('month-block');
            monthBlock.id = `month-${year}-${month}`;
            // Salviamo i dati nel dataset per intercettarli durante lo scroll
            monthBlock.dataset.year = year; 

            const title = document.createElement('div');
            title.classList.add('month-title');
            title.innerText = `${monthNames[month]} ${year}`;
            monthBlock.appendChild(title);

            const grid = document.createElement('div');
            grid.classList.add('calendar-grid');

            // Calcolo spazi vuoti iniziali del mese
            const firstDay = new Date(year, month, 1);
            let startDayOfWeek = firstDay.getDay() - 1;
            if (startDayOfWeek === -1) startDayOfWeek = 6; // Domenica diventa 6

            // Inserisci celle invisibili per i giorni vuoti
            for (let e = 0; e < startDayOfWeek; e++) {
                const emptyCell = document.createElement('div');
                emptyCell.classList.add('day-empty');
                grid.appendChild(emptyCell);
            }

            // Inserisci i giorni reali del mese
            const totalDays = new Date(year, month + 1, 0).getDate();
            for (let day = 1; day <= totalDays; day++) {
                const cellDate = new Date(year, month, day);
                
                const cell = document.createElement('div');
                cell.classList.add('day-cell');

                // Verifica se è Oggi
                if (day === realToday.getDate() && month === realToday.getMonth() && year === realToday.getFullYear()) {
                    cell.classList.add('today');
                }

                // Verifica se è Selezionato
                if (day === selectedDate.getDate() && month === selectedDate.getMonth() && year === selectedDate.getFullYear()) {
                    cell.classList.add('selected');
                }

                const numSpan = document.createElement('span');
                numSpan.classList.add('day-number');
                numSpan.innerText = day;
                cell.appendChild(numSpan);

                // Puntino per futuri eventi del mentalista
                const dot = document.createElement('div');
                dot.classList.add('event-dot');
                cell.appendChild(dot);

                // Evento click del giorno
                cell.addEventListener('click', () => {
                    document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
                    cell.classList.add('selected');
                    selectedDate = cellDate;
                    updateEventText(selectedDate);
                });

                grid.appendChild(cell);
            }

            monthBlock.appendChild(grid);
            scrollArea.appendChild(monthBlock);
        }

        // Aggiorna la barra dell'anno in alto dinamicamente guardando quale mese è visibile sullo schermo
        scrollArea.addEventListener('scroll', () => {
            const blocks = document.querySelectorAll('.month-block');
            let currentVisibleYear = realToday.getFullYear();
            
            for (let block of blocks) {
                const rect = block.getBoundingClientRect();
                // Se il titolo del mese si trova nella metà superiore dello schermo
                if (rect.top >= 0 && rect.top < 300) {
                    currentVisibleYear = block.dataset.year;
                    break;
                }
            }
            labelYear.innerText = currentVisibleYear;
        });

        function updateEventText(date) {
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            const formattedDate = date.toLocaleDateString('it-IT', options).toUpperCase();
            eventBox.innerHTML = `${formattedDate}<div class="event-time-line">Nessun evento</div>`;
        }

        // Tasto Oggi: fa rimbalzare istantaneamente alla data odierna
        document.getElementById('btn-today').addEventListener('click', () => {
            selectedDate = new Date(realToday);
            document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
            
            const todayBlock = document.getElementById(`month-${realToday.getFullYear()}-${realToday.getMonth()}`);
            if (todayBlock) {
                todayBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
                setTimeout(() => {
                    // Cerca la cella 'today' e selezionala
                    const todayCell = todayBlock.querySelector('.today');
                    if(todayCell) todayCell.classList.add('selected');
                    updateEventText(realToday);
                }, 300);
            }
        });

        // Avvia l'applicazione
        initCalendar();
    </script>
</body>
</html>
