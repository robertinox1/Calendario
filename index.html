<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendario</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1C1C1E;
            --ios-text: #FFFFFF;
            --ios-gray: #8E8E93;
            --ios-dark-gray: #48484A; 
            --ios-tint: #FF453A; 
            --ios-border: rgba(84, 84, 88, 0.65); 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            height: 100vh;
        }

        /* HEADER PRINCIPALE CONFERMATO */
        .ios-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--ios-bg);
            z-index: 100;
            padding: 20px 16px 4px 16px;
        }

        .navbar-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
        }

        .back-year-btn {
            background-color: var(--ios-card);
            border: none;
            color: #FFFFFF; 
            font-size: 16px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
        }

        .capsula-alto-img {
            height: 38px;
            object-fit: contain;
            opacity: 0.45;
        }

        .main-month-title {
            font-size: 34px;
            font-weight: 700;
            margin: 8px 0 6px 4px;
        }

        /* Lettere feriali accese (Confermate) */
        .weekdays-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            color: #FFFFFF; 
            font-size: 11px;
            font-weight: 600;
            padding-bottom: 8px;
            border-bottom: 0.5px solid var(--ios-border);
            margin-top: 10px;
        }
        
        .weekdays-grid div:nth-child(6), .weekdays-grid div:nth-child(7) {
            color: var(--ios-dark-gray); 
        }

        /* CALENDARIO A GRIGLIA UNICA CONTINUA */
        .calendar-scroll-view {
            height: 100vh;
            overflow-y: scroll;
            padding-top: 140px; 
            padding-bottom: 120px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .grid-continua {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            padding: 0 16px;
        }

        /* CELLA GIORNO: Linea spessa e continua sotto ogni singola riga di numeri */
        .day-cell {
            position: relative;
            text-align: center;
            font-size: 16px; 
            font-weight: 700; 
            height: 58px; /* Spaziatura verticale calibrata sullo screenshot */
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            padding-bottom: 6px;
            border-bottom: 1px solid var(--ios-border); /* Linea orizzontale che attraversa tutto lo schermo */
            cursor: pointer;
        }

        /* Celle vuote di riempimento per mantenere le linee continue */
        .day-cell.empty {
            cursor: default;
        }

        .day-number {
            width: 34px; 
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        /* Sabato e Domenica spenti */
        .day-cell.sat, .day-cell.sun { color: var(--ios-dark-gray); } 
        
        /* Giorno corrente cerchiato in rosso */
        .day-cell.today .day-number { background-color: var(--ios-tint); color: #ffffff; }

        /* IL VERO MESE ABBREVIATO DI iOS: Grande, in grassetto, inserito sopra il giorno 1 */
        .month-start-label {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 15px; /* Ingrandito come da richiesta */
            font-weight: 700; /* Grassetto marcato */
            color: #FFFFFF;
            letter-spacing: -0.2px;
        }
        .day-cell.current-month-break .month-start-label { 
            color: var(--ios-tint); /* Diventa rosso (es. Mag) se è il mese corrente */
        }

        /* FOOTER */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 84px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px 24px 16px;
            z-index: 120;
        }

        .today-png-btn, .capsula-basso-img {
            height: 44px;
            object-fit: contain;
            opacity: 0.45;
        }
    </style>
</head>
<body>

    <div class="ios-header">
        <div class="navbar-top">
            <button class="back-year-btn">‹ <span id="current-year-header">2026</span></button>
            <img src="capsula-alto.png" class="capsula-alto-img" alt="">
        </div>
        <div class="main-month-title" id="main-title-display">Maggio</div>
        <div class="weekdays-grid">
            <div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div>
        </div>
    </div>

    <!-- CONTENITORE UNICO PER TUTTI I MESI -->
    <div class="calendar-scroll-view" id="scroll-container" onscroll="gestisciScorrimentoMesi()">
        <div class="grid-continua" id="main-grid"></div>
    </div>

    <div class="bottom-bar">
        <img src="pulsante-oggi.png" class="today-png-btn" alt="" onclick="scattaSuOggi()">
        <img src="capsula-basso.png" class="capsula-basso-img" alt="">
    </div>

    <script>
        const nomiMesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        const nomiMesiBrevi = ["Gen", "Feb", "Mar", "Apr", "Mag", "Giu", "Lug", "Ago", "Set", "Ott", "Nov", "Dic"];
        
        let oggi = new Date();
        let annoCorrenteView = oggi.getFullYear();

        window.onload = function() {
            renderizzaCalendarioContinuo();
            setTimeout(scattaSuOggi, 100); // Centra in automatico su oggi al caricamento
        };

        function idData(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }

        function renderizzaCalendarioContinuo() {
            const grid = document.getElementById("main-grid");
            grid.innerHTML = "";

            // Genera la timeline da 14 mesi fa a 14 mesi nel futuro (ampio raggio di oltre due anni completi)
            let dataLavoro = new Date(oggi.getFullYear() - 1, oggi.getMonth() - 2, 1);

            for (let m = 0; m < 28; m++) {
                let anno = dataLavoro.getFullYear();
                let mese = dataLavoro.getMonth();

                let primoGiornoReal = new Date(anno, mese, 1).getDay();
                let offsetReal = primoGiornoReal === 0 ? 6 : primoGiornoReal - 1;

                // Se è il primissimo mese della timeline, inseriamo i quadrati vuoti iniziali per allineare i giorni della settimana
                if (m === 0) {
                    for (let e = 0; e < offsetReal; e++) { 
                        let empty = document.createElement("div");
                        empty.className = "day-cell empty"; 
                        grid.appendChild(empty); 
                    }
                }

                let giorniNelMese = new Date(anno, mese + 1, 0).getDate();
                for (let g = 1; g <= giorniNelMese; g++) {
                    let dataGiorno = new Date(anno, mese, g);
                    let dayOfWeek = dataGiorno.getDay();
                    let sData = idData(dataGiorno);

                    let dCell = document.createElement("div");
                    dCell.className = "day-cell";
                    dCell.setAttribute("data-anno", anno);
                    dCell.setAttribute("data-mese-nome", nomiMesi[mese]);
                    dCell.id = `cell-${sData}`;

                    if (dayOfWeek === 0) dCell.classList.add("sun");
                    if (dayOfWeek === 6) dCell.classList.add("sat");

                    // LOGICA DEFINITIVA: Inserisce il mese abbreviato (Dic, Gen) sopra il numero 1
                    if (g === 1) {
                        let shortLabel = document.createElement("div");
                        shortLabel.className = "month-start-label";
                        if (mese === oggi.getMonth() && anno === oggi.getFullYear()) {
                            dCell.classList.add("current-month-break");
                        }
                        shortLabel.innerText = nomiMesiBrevi[mese];
                        dCell.appendChild(shortLabel);
                    }

                    let dNum = document.createElement("div");
                    dNum.className = "day-number";
                    dNum.innerText = g;
                    dCell.appendChild(dNum);

                    // Evidenziazione tempo reale di oggi
                    if (dataGiorno.getDate() === oggi.getDate() && dataGiorno.getMonth() === oggi.getMonth() && dataGiorno.getFullYear() === oggi.getFullYear()) {
                        dCell.classList.add("today");
                    }

                    grid.appendChild(dCell);
                }

                dataLavoro.setMonth(dataLavoro.getMonth() + 1);
            }
        }

        // AGGIORNA IN TEMPO REALE IL TITOLO GRANDE DEL MESE E IL NUMERO DELL'ANNO DURANTE LO SCORRIMENTO
        function gestisciScorrimentoMesi() {
            const cells = document.getElementsByClassName("day-cell");
            let meseAttuale = nomiMesi[oggi.getMonth()];
            let annoAttuale = oggi.getFullYear();
            
            for (let cell of cells) {
                let rect = cell.getBoundingClientRect();
                if (rect.top >= 150 && rect.top <= 220) {
                    let mNome = cell.getAttribute("data-mese-nome");
                    let aNome = cell.getAttribute("data-anno");
                    if (mNome) meseAttuale = mNome;
                    if (aNome) annoAttuale = aNome;
                    break;
                }
            }
            document.getElementById("main-title-display").innerText = meseAttuale;
            document.getElementById("current-year-header").innerText = annoAttuale;
        }

        function scattaSuOggi() {
            let sDataOggi = idData(oggi);
            let elementoOggi = document.getElementById(`cell-${sDataOggi}`);
            if (elementoOggi) {
                elementoOggi.scrollIntoView({ block: "center", behavior: "smooth" });
                meseCorrenteView = oggi.getMonth();
                annoCorrenteView = oggi.getFullYear();
                document.getElementById("main-title-display").innerText = nomiMesi[oggi.getMonth()];
                document.getElementById("current-year-header").innerText = oggi.getFullYear();
            }
        }
    </script>
</body>
</html>
