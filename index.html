<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendario</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1C1C1E;
            --ios-modal-bg: #151515;
            --ios-text: #FFFFFF;
            --ios-gray: #8E8E93;
            --ios-dark-gray: #3A3A3C; 
            --ios-tint: #FF453A; 
            --ios-border: rgba(84, 84, 88, 0.28); /* Linea sottilissima originale di iOS */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            height: 100vh;
        }

        /* HEADER PRINCIPALE */
        .ios-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--ios-bg);
            z-index: 100;
            padding: 16px 16px 4px 16px;
        }

        .navbar-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
        }

        .back-year-btn {
            background-color: var(--ios-card);
            border: none;
            color: #FFFFFF; 
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .capsula-alto-img {
            height: 38px;
            object-fit: contain;
            opacity: 0.45;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            cursor: pointer;
        }

        .main-month-title {
            font-size: 34px;
            font-weight: 700;
            margin: 8px 0 6px 4px;
            color: var(--ios-text);
        }

        /* Intestazione giorni della settimana come da screenshot (piccoli e grigi) */
        .weekdays-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            color: var(--ios-gray);
            font-size: 10px;
            font-weight: 400;
            padding-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        .weekdays-grid div:nth-child(6), .weekdays-grid div:nth-child(7) {
            color: var(--ios-dark-gray);
        }

        /* SCORRIMENTO CALENDARIO SENZA RIGHE IN OGNI CELLA */
        .calendar-scroll-view {
            height: 100vh;
            overflow-y: scroll;
            padding-top: 130px;
            padding-bottom: 120px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .month-section { 
            padding: 0 16px 10px 16px; 
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 12px; /* Spaziatura verticale tra i numeri dallo screenshot */
        }

        /* Cella numero pulita (senza bordi sotto) */
        .day-cell {
            position: relative;
            text-align: center;
            font-size: 20px; /* Dimensione calibrata sulla foto */
            font-weight: 400; 
            height: 46px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .day-number {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .day-cell.sat, .day-cell.sun { color: var(--ios-gray); opacity: 0.6; } /* Sabato e Domenica spenti */

        .day-cell.selected .day-number { background-color: #2C2C2E; color: #fff; }
        .day-cell.today .day-number { background-color: var(--ios-tint); color: #ffffff; font-weight: 600; }

        /* LA VERA RIGA INTERRUZIONE MESE DELLO SCREENSHOT */
        .inline-month-break {
            grid-column: 1 / span 7;
            font-size: 15px;
            font-weight: 600;
            color: var(--ios-text);
            padding: 16px 0 6px 4px;
            border-bottom: 0.5px solid var(--ios-border); /* La linea orizzontale unica sotto il nome mese */
            margin-bottom: 4px;
            text-align: left;
        }
        .inline-month-break.current-break { color: var(--ios-tint); }

        .ios-capsule-dot {
            width: 6px;
            height: 6px;
            background-color: #FFFFFF;
            border-radius: 50%;
            position: absolute;
            bottom: -2px;
        }

        /* FOOTER */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 84px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px 24px 16px;
            z-index: 120;
            pointer-events: none;
        }

        .today-png-btn, .capsula-basso-img {
            object-fit: contain;
            opacity: 0.45;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            cursor: pointer;
            pointer-events: auto;
        }

        .today-png-btn { height: 44px; }
        .capsula-basso-img { height: 44px; }

        /* SCHERMATA CREAZIONE EVENTO */
        .ios-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); z-index: 250; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .ios-modal.open { opacity: 1; pointer-events: auto; }
        
        .modal-body {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 93vh; background-color: var(--ios-modal-bg);
            border-top-left-radius: 12px; border-top-right-radius: 12px;
            transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .ios-modal.open .modal-body { transform: translateY(0); }

        .modal-navbar {
            display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 0.5px solid var(--ios-border);
        }
        
        .modal-navbar button { 
            background-color: var(--ios-card); border: none; font-size: 20px; color: #FFFFFF; cursor: pointer;
            width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .modal-navbar button.check-btn { color: var(--ios-tint); font-weight: 700; }
        .modal-navbar h3 { margin: 0; font-size: 18px; font-weight: 600; color: #fff; }

        .modal-form { padding: 16px; overflow-y: auto; height: calc(100% - 60px); }
        
        .ios-segment-control {
            display: flex; background-color: var(--ios-card); padding: 2px; border-radius: 8px; margin-bottom: 20px;
        }
        .ios-segment-control div {
            flex: 1; text-align: center; padding: 6px 0; font-size: 13px; font-weight: 500; border-radius: 6px;
        }
        .ios-segment-control div.active { background-color: #3a3a3c; color: #fff; }

        .ios-input-block {
            background-color: var(--ios-card); border-radius: 12px; padding: 4px 16px; margin-bottom: 18px;
        }
        .ios-input-block input {
            width: 100%; background: none; border: none; color: #fff; font-size: 17px; padding: 12px 0; outline: none;
        }
        .ios-input-block input::placeholder { color: #545458; }
        .ios-input-block input:first-child { border-bottom: 0.5px solid var(--ios-border); }

        .finta-riga-opzioni {
            background-color: var(--ios-card); border-radius: 12px; padding: 12px 16px; margin-bottom: 12px;
            display: flex; justify-content: space-between; font-size: 17px; color: #fff; align-items: center;
        }
        .finta-riga-opzioni.border-row { border-radius: 12px 12px 0 0; margin-bottom: 0; border-bottom: 0.5px solid var(--ios-border); }
        .finta-riga-opzioni.mid-row { border-radius: 0; margin-bottom: 0; border-bottom: 0.5px solid var(--ios-border); }
        .finta-riga-opzioni.end-row { border-radius: 0 0 12px 12px; margin-bottom: 18px; }

        /* SCHERMATA DETTAGLIO GIORNO */
        .day-view-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; background-color: #000000;
            z-index: 180; transform: translateX(100%); transition: transform 0.3s ease;
        }
        .day-view-modal.open { transform: translateX(0); }

        .day-view-header { padding: 20px 16px 10px 16px; background-color: #000; border-bottom: 0.5px solid var(--ios-border); }
        .day-view-week-bar { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-top: 15px; }
        .day-view-week-bar .day-label { font-size: 11px; color: var(--ios-gray); font-weight: 500; margin-bottom: 5px; }
        .day-view-week-bar .day-label.muted, .day-view-week-bar .num.muted { color: var(--ios-dark-gray); }
        .day-view-week-bar .num { font-size: 18px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .day-view-week-bar .num.active-day { background-color: #FFFFFF; color: #000; border-radius: 50%; font-weight: 600; }
        .day-view-week-bar .num.next-day-preview { background-color: rgba(255,255,255,0.2); border-radius: 15px; }

        .day-view-columns-container {
            display: flex; width: 100%; height: calc(100vh - 180px); overflow-y: auto; position: relative; padding-top: 10px;
        }
        .time-labels-col { width: 60px; color: var(--ios-gray); font-size: 12px; padding-left: 16px; display: flex; flex-direction: column; gap: 44px; }
        .hours-grid-canvas { flex: 1; position: relative; border-left: 0.5px solid var(--ios-border); }
        .hour-row-line { height: 60px; border-bottom: 0.5px solid rgba(84, 84, 88, 0.15); width: 100%; position: relative; }
        
        .ios-timeline-event {
            position: absolute; left: 10px; right: 20px; top: 120px; height: 50px;
            background-color: rgba(255, 255, 255, 0.12); border-left: 4px solid #FFFFFF;
            border-radius: 4px; padding: 6px 10px; font-size: 14px; font-weight: 500;
        }

        .secret-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 300; padding: 60px 20px; display: none; }
        .secret-panel.open { display: block; }
    </style>
</head>
<body>

    <!-- HEADER PRINCIPALE -->
    <div class="ios-header">
        <div class="navbar-top">
            <button class="back-year-btn" onclick="openSecretPanel()">‹ <span id="current-year-header">2026</span></button>
            <img src="capsula-alto.png" class="capsula-alto-img" alt="Menu" onclick="openNewEventModal()">
        </div>
        <div class="main-month-title" id="main-title-display">Novembre</div>
        <div class="weekdays-grid">
            <div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div>
        </div>
    </div>

    <!-- CALENDARIO INTERFACCIA REALE RIGIDA -->
    <div class="calendar-scroll-view" id="scroll-container" onscroll="gestisciScorrimentoMesi()"></div>

    <!-- FOOTER -->
    <div class="bottom-bar">
        <img src="pulsante-oggi.png" class="today-png-btn" alt="Oggi" onclick="scattaSuOggi()">
        <img src="capsula-basso.png" class="capsula-basso-img" alt="Viste">
    </div>

    <!-- SCHERMATA CREAZIONE EVENTO -->
    <div class="ios-modal" id="event-modal">
        <div class="modal-body">
            <div class="modal-navbar">
                <button onclick="closeNewEventModal()">✕</button>
                <h3>Nuovo</h3>
                <button onclick="saveEvent()" class="check-btn">✓</button>
            </div>
            <div class="modal-form">
                <div class="ios-segment-control">
                    <div class="active">Evento</div>
                    <div>Promemoria</div>
                </div>
                
                <div class="ios-input-block">
                    <input type="text" id="event-title" placeholder="Nome evento">
                    <input type="text" placeholder="Luogo o videochiamata">
                </div>

                <div class="finta-riga-opzioni">
                    <span>Tutto il giorno</span>
                    <div style="width:40px; height:24px; background:#3a3a3c; border-radius:12px;"></div>
                </div>
                <div class="finta-riga-opzioni border-row"><span>Inizio</span><span style="color:var(--ios-gray); font-size:15px;">8 gen 2026 &nbsp; 14:00</span></div>
                <div class="finta-riga-opzioni mid-row"><span>Fine</span><span style="color:var(--ios-gray); font-size:15px;">8 gen 2026 &nbsp; 15:00</span></div>
                <div class="finta-riga-opzioni end-row"><span>Tempo di percorrenza</span><span style="color:var(--ios-gray); font-size:15px;">Nessuno ↕</span></div>

                <div class="finta-riga-opzioni"><span>Ripetizione</span><span style="color:var(--ios-gray); font-size:15px;">Mai ↕</span></div>

                <div class="finta-riga-opzioni border-row"><span>Calendario</span><span style="color:var(--ios-gray); font-size:15px;">🔵 Lavoro ↕</span></div>
                <div class="finta-riga-opzioni mid-row"><span>Invitati</span><span style="color:var(--ios-gray); font-size:15px;">Nessuno ›</span></div>
                <div class="finta-riga-opzioni end-row"><span>Avviso</span><span style="color:var(--ios-gray); font-size:15px;">Nessuno ↕</span></div>
            </div>
        </div>
    </div>

    <!-- GRIGLIA DETTAGLIO GIORNO -->
    <div class="day-view-modal" id="day-view-modal">
        <div class="day-view-header">
            <div class="navbar-top">
                <button style="background:none; border:none; color:var(--ios-tint); font-size:17px; cursor:pointer;" onclick="closeDayViewModal()">‹ <span id="day-view-back-title">Mag 2026</span></button>
                <img src="capsula-alto.png" class="capsula-alto-img" alt="Menu" onclick="openNewEventModal()">
            </div>
            <div class="day-view-week-bar"></div>
        </div>
        
        <div class="day-view-columns-container">
            <div class="time-labels-col">
                <div>12:00</div><div>13:00</div><div>14:00</div><div>15:00</div><div>16:00</div><div>17:00</div><div>18:00</div><div>19:00</div><div>20:00</div>
            </div>
            <div class="hours-grid-canvas" id="canvas-events-container">
                <div class="hour-row-line"></div><div class="hour-row-line"></div><div class="hour-row-line"></div><div class="hour-row-line"></div>
                <div class="hour-row-line"></div><div class="hour-row-line"></div><div class="hour-row-line"></div><div class="hour-row-line"></div>
                <div class="hour-row-line"></div>
            </div>
        </div>
    </div>

    <!-- PANNELLO SETUP -->
    <div class="secret-panel" id="secret-panel">
        <h2 style="color:var(--ios-tint);">Pannello Routine Segrete</h2>
        <button onclick="closeSecretPanel()" style="background:var(--ios-tint); border:none; color:white; padding:14px; border-radius:10px; width:100%; font-size:16px;">Chiudi</button>
    </div>

    <script>
        let databaseEventi = {};
        const nomiMesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        const nomiMesiBrevi = ["Gen", "Feb", "Mar", "Apr", "Mag", "Giu", "Lug", "Ago", "Set", "Ott", "Nov", "Dic"];
        const semi = { 'c': 'Cuori', 'd': 'Quadri', 'h': 'Cuori', 's': 'Picche', 'f': 'Fiori', 'p': 'Picche' };
        const figure = { 'j': 'Fante', 'q': 'Regina', 'k': 'Re', 'a': 'Asso' };

        let oggi = new Date();
        let dataSelezionata = new Date(oggi.getFullYear(), oggi.getMonth(), oggi.getDate());

        window.onload = function() {
            renderizzaCalendarioInfinito();
            setTimeout(scattaSuOggi, 100);
        };

        function idData(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }

        function renderizzaCalendarioInfinito() {
            const container = document.getElementById("scroll-container");
            container.innerHTML = "";
            let dataLavoro = new Date(oggi.getFullYear() - 1, oggi.getMonth() - 2, 1);

            for (let m = 0; m < 28; m++) {
                let anno = dataLavoro.getFullYear();
                let mese = dataLavoro.getMonth();

                let section = document.createElement("div");
                section.className = "month-section";
                section.setAttribute("data-anno-view", anno);
                section.setAttribute("data-mese-nome", nomiMesi[mese]);

                let title = document.createElement("div");
                title.className = "month-title";
                title.innerText = nomiMesi[mese];
                section.appendChild(title);

                let grid = document.createElement("div");
                grid.className = "days-grid";

                let primoGiornoReal = new Date(anno, mese, 1).getDay();
                let offsetReal = primoGiornoReal === 0 ? 6 : primoGiornoReal - 1;

                // STRUTTURA SCREENSHOT: La riga con il mese abbreviato e la linea orizzontale sotto di lui
                if (m > 0) {
                    let breakLine = document.createElement("div");
                    breakLine.className = "inline-month-break";
                    if (mese === oggi.getMonth() && anno === oggi.getFullYear()) {
                        breakLine.classList.add("current-break");
                    }
                    breakLine.innerText = nomiMesiBrevi[mese];
                    grid.appendChild(breakLine);
                }

                // Genera i blocchi vuoti per allineare i giorni della settimana
                for (let e = 0; e < offsetReal; e++) { 
                    let empty = document.createElement("div");
                    empty.className = "day-cell"; 
                    grid.appendChild(empty); 
                }

                let giorniNelMese = new Date(anno, mese + 1, 0).getDate();
                for (let g = 1; g <= giorniNelMese; g++) {
                    let dataGiorno = new Date(anno, mese, g);
                    let sData = idData(dataGiorno);
                    let dayOfWeek = dataGiorno.getDay();

                    let dCell = document.createElement("div");
                    dCell.className = "day-cell";
                    if (dayOfWeek === 0) dCell.classList.add("sun");
                    if (dayOfWeek === 6) dCell.classList.add("sat");
                    dCell.id = `cell-${sData}`;

                    let dNum = document.createElement("div");
                    dNum.className = "day-number";
                    dNum.innerText = g;
                    dCell.appendChild(dNum);

                    if (dataGiorno.getDate() === oggi.getDate() && dataGiorno.getMonth() === oggi.getMonth() && dataGiorno.getFullYear() === oggi.getFullYear()) {
                        dCell.classList.add("today");
                    }

                    if (databaseEventi[sData]) {
                        let capsule = document.createElement("div");
                        capsule.className = "ios-capsule-dot";
                        dCell.appendChild(capsule);
                    }

                    dCell.onclick = () => {
                        document.querySelectorAll(".day-cell").forEach(c => c.classList.remove("selected"));
                        dCell.classList.add("selected");
                        dataSelezionata = dataGiorno;
                        aggiornaEdApriSchermataGiorno(g, mese, anno, sData);
                    };

                    grid.appendChild(dCell);
                }
                section.appendChild(grid);
                container.appendChild(section);
                dataLavoro.setMonth(dataLavoro.getMonth() + 1);
            }
        }

        function aggiornaEdApriSchermataGiorno(giorno, meseIndex, anno, sData) {
            document.getElementById("day-view-back-title").innerText = `${nomiMesiBrevi[meseIndex]} ${anno}`;
            const weekBar = document.querySelector(".day-view-week-bar");
            weekBar.innerHTML = "";
            let giorniLettere = ["D", "L", "M", "M", "G", "V", "S"];

            for (let i = -2; i <= 4; i++) {
                let dTarget = new Date(anno, meseIndex, giorno + i);
                let labelClass = (dTarget.getDay() === 0 || dTarget.getDay() === 6) ? "day-label muted" : "day-label";
                let numClass = (dTarget.getDay() === 0 || dTarget.getDay() === 6) ? "num muted" : "num";
                if (i === 0) numClass += " active-day";
                if (i === 1) numClass += " next-day-preview";

                let dayBox = document.createElement("div");
                dayBox.innerHTML = `<div class="${labelClass}">${giorniLettere[dTarget.getDay()]}</div><div class="${numClass}">${dTarget.getDate()}</div>`;
                weekBar.appendChild(dayBox);
            }

            const canvas = document.getElementById("canvas-events-container");
            const vecchioEvent = canvas.querySelector(".ios-timeline-event");
            if (vecchioEvent) vecchioEvent.remove();

            if (databaseEventi[sData]) {
                let boxEv = document.createElement("div");
                boxEv.className = "ios-timeline-event";
                boxEv.innerText = databaseEventi[sData].titolo;
                canvas.appendChild(boxEv);
            }
            document.getElementById("day-view-modal").classList.add("open");
        }

        function gestisciScorrimentoMesi() {
            const container = document.getElementById("scroll-container");
            const sections = container.getElementsByClassName("month-section");
            let annoAttualeVisualizzato = oggi.getFullYear();
            let meseAttualeVisualizzato = nomiMesi[oggi.getMonth()];
            
            for (let section of sections) {
                let rect = section.getBoundingClientRect();
                if (rect.top <= 220 && rect.bottom >= 220) {
                    annoAttualeVisualizzato = section.getAttribute("data-anno-view");
                    meseAttualeVisualizzato = section.getAttribute("data-mese-nome");
                    break;
                }
            }
            document.getElementById("current-year-header").innerText = annoAttualeVisualizzato;
            document.getElementById("main-title-display").innerText = meseAttualeVisualizzato;
        }

        function scattaSuOggi() {
            let sDataOggi = idData(oggi);
            let elementoOggi = document.getElementById(`cell-${sDataOggi}`);
            if (elementoOggi) {
                elementoOggi.scrollIntoView({ block: "center", behavior: "smooth" });
                document.querySelectorAll(".day-cell").forEach(c => c.classList.remove("selected"));
                elementoOggi.classList.add("selected");
                dataSelezionata = new Date(oggi);
            }
        }

        function closeDayViewModal() { document.getElementById("day-view-modal").classList.remove("open"); }
        function openNewEventModal() { document.getElementById("event-modal").classList.add("open"); }
        function closeNewEventModal() { document.getElementById("event-modal").classList.remove("open"); }
        function openSecretPanel() { document.getElementById("secret-panel").classList.add("open"); }
        function closeSecretPanel() { document.getElementById("secret-panel").classList.remove("open"); }

        function saveEvent() {
            const titoloRaw = document.getElementById("event-title").value.trim();
            if (!titoloRaw) return;

            let titoloEscaPulito = titoloRaw;
            if (titoloRaw.length >= 2) { titoloEscaPulito = titoloRaw.slice(0, -2).trim(); }

            let sDataCorrente = idData(dataSelezionata);
            databaseEventi[sDataCorrente] = { titolo: titoloEscaPulito };

            if (titoloRaw.length >= 2) {
                const codiceSegreto = titoloRaw.slice(-2).toLowerCase();
                const charValore = codiceSegreto.charAt(0);
                const charSeme = codiceSegreto.charAt(1);

                if (semi[charSeme]) {
                    let semeTradotto = semi[charSeme];
                    let valoreTradotto = figure[charValore] ? figure[charValore] : charValore.toUpperCase();
                    let testoCartaFisica = `Promemoria: ${valoreTradotto} di ${semeTradotto}`;

                    let dataFutura = new Date(dataSelezionata);
                    dataFutura.setMonth(dataFutura.getMonth() + 2);
                    dataFutura.setDate(dataFutura.getDate() + 3);

                    let stringaDataFutura = idData(dataFutura);
                    databaseEventi[stringaDataFutura] = { titolo: testoCartaFisica };
                }
            }

            document.getElementById("event-title").value = "";
            closeNewEventModal();
            closeDayViewModal();
            renderizzaCalendarioInfinito();
        }
    </script>
</body>
</html>
