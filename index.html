<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendario</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1C1C1E;
            --ios-text: #FFFFFF;
            --ios-gray: #8E8E93;
            --ios-dark-gray: #48484A; 
            --ios-tint: #FF453A; 
            --ios-border: rgba(84, 84, 88, 0.75); /* Linee orizzontali spesse e molto evidenti */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            height: 100vh;
        }

        /* HEADER PRINCIPALE CON ELEMENTI CONFERMATI */
        .ios-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--ios-bg);
            z-index: 100;
            padding: 20px 16px 4px 16px;
        }

        .navbar-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
        }

        .back-year-btn {
            background-color: var(--ios-card);
            border: none;
            color: #FFFFFF; 
            font-size: 16px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
        }

        .capsula-alto-img {
            height: 38px;
            object-fit: contain;
            opacity: 0.45;
        }

        .main-month-title {
            font-size: 34px;
            font-weight: 700;
            margin: 8px 0 6px 4px;
        }

        /* Lettere feriali accese (Confermate) */
        .weekdays-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            color: #FFFFFF; 
            font-size: 11px;
            font-weight: 600;
            padding-bottom: 8px;
            border-bottom: 0.5px solid var(--ios-border);
            margin-top: 10px;
        }
        
        .weekdays-grid div:nth-child(6), .weekdays-grid div:nth-child(7) {
            color: var(--ios-dark-gray); 
        }

        /* VISTA SCORRIMENTO */
        .calendar-scroll-view {
            height: 100vh;
            overflow-y: scroll;
            padding-top: 140px; 
            padding-bottom: 120px;
            -webkit-overflow-scrolling: touch;
        }

        .month-section { 
            padding: 0 16px 0 16px; 
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 0; /* Gestito dalle celle per avere linee continue perfette */
            column-gap: 12px; 
        }

        /* CELLA GIORNO: Linee spesse continue da riga a riga */
        .day-cell {
            position: relative;
            text-align: center;
            font-size: 16px; 
            font-weight: 700; 
            height: 64px; /* Altezza aumentata per ospitare il testo sopra il numero */
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Spinge il numero verso il basso, vicino alla linea */
            padding-bottom: 8px;
            border-bottom: 1.2px solid var(--ios-border); /* La linea spessa e continua sotto ogni giorno */
        }

        .day-number {
            width: 34px; 
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            z-index: 5;
        }

        .day-cell.sat, .day-cell.sun { color: var(--ios-dark-gray); } 
        .day-cell.today .day-number { background-color: var(--ios-tint); color: #ffffff; }

        /* SCRITTA DEL MESE ABBREVIATO INGRANDITA E POSIZIONATA SOPRA IL NUMERO 1 */
        .month-start-label {
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 15px; /* Scritta molto più grande richiesta */
            font-weight: 700; /* In un grassetto marcato */
            color: #FFFFFF;
            text-transform: capitalize;
            z-index: 10;
        }
        .month-start-label.current-break { color: var(--ios-tint); }

        /* FOOTER */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 84px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px 24px 16px;
            z-index: 120;
        }

        .today-png-btn, .capsula-basso-img {
            height: 44px;
            object-fit: contain;
            opacity: 0.45;
        }
    </style>
</head>
<body>

    <div class="ios-header">
        <div class="navbar-top">
            <button class="back-year-btn">‹ 2026</button>
            <img src="capsula-alto.png" class="capsula-alto-img" alt="">
        </div>
        <div class="main-month-title" id="main-title-display">Novembre</div>
        <div class="weekdays-grid">
            <div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div>
        </div>
    </div>

    <div class="calendar-scroll-view" id="scroll-container" onscroll="gestisciScorrimentoMesi()"></div>

    <div class="bottom-bar">
        <img src="pulsante-oggi.png" class="today-png-btn" alt="">
        <img src="capsula-basso.png" class="capsula-basso-img" alt="">
    </div>

    <script>
        const nomiMesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        const nomiMesiBrevi = ["Gen", "Feb", "Mar", "Apr", "Mag", "Giu", "Lug", "Ago", "Set", "Ott", "Nov", "Dic"];
        let oggi = new Date();

        window.onload = function() {
            renderizzaCalendarioDinamico();
        };

        function idData(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }

        function renderizzaCalendarioDinamico() {
            const container = document.getElementById("scroll-container");
            container.innerHTML = "";
            let dataLavoro = new Date(2026, 10, 1); // Novembre 2026

            for (let m = 0; m < 4; m++) {
                let anno = dataLavoro.getFullYear();
                let mese = dataLavoro.getMonth();

                let section = document.createElement("div");
                section.className = "month-section";
                section.setAttribute("data-mese-nome", nomiMesi[mese]);

                let grid = document.createElement("div");
                grid.className = "days-grid";

                let primoGiornoReal = new Date(anno, mese, 1).getDay();
                let offsetReal = primoGiornoReal === 0 ? 6 : primoGiornoReal - 1;

                // Genera le celle anche per gli spazi vuoti iniziali della settimana, così le linee orizzontali sono continue fin dall'inizio
                for (let e = 0; e < offsetReal; e++) { 
                    let empty = document.createElement("div");
                    empty.className = "day-cell"; 
                    grid.appendChild(empty); 
                }

                let giorniNelMese = new Date(anno, mese + 1, 0).getDate();
                for (let g = 1; g <= giorniNelMese; g++) {
                    let dataGiorno = new Date(anno, mese, g);
                    let dayOfWeek = dataGiorno.getDay();

                    let dCell = document.createElement("div");
                    dCell.className = "day-cell";
                    if (dayOfWeek === 0) dCell.classList.add("sun");
                    if (dayOfWeek === 6) dCell.classList.add("sat");

                    // Inserisce il mese abbreviato ingrandito ESATTAMENTE nella cella del giorno 1, sopra il numero
                    if (g === 1 && m > 0) {
                        let shortLabel = document.createElement("div");
                        shortLabel.className = "month-start-label";
                        shortLabel.innerText = nomiMesiBrevi[mese];
                        dCell.appendChild(shortLabel);
                    }

                    let dNum = document.createElement("div");
                    dNum.className = "day-number";
                    dNum.innerText = g;
                    dCell.appendChild(dNum);

                    grid.appendChild(dCell);
                }

                // Se l'ultimo giorno del mese non cade di domenica, riempie la riga con celle vuote per far continuare la linea spessa fino alla fine dello schermo
                let ultimoGiornoReal = new Date(anno, mese, giorniNelMese).getDay();
                let offsetFine = ultimoGiornoReal === 0 ? 0 : 7 - ultimoGiornoReal;
                for (let e = 0; e < offsetFine; e++) {
                    let emptyFine = document.createElement("div");
                    emptyFine.className = "day-cell";
                    grid.appendChild(emptyFine);
                }

                section.appendChild(grid);
                container.appendChild(section);
                dataLavoro.setMonth(dataLavoro.getMonth() + 1);
            }
        }

        function gestisciScorrimentoMesi() {
            const container = document.getElementById("scroll-container");
            const sections = container.getElementsByClassName("month-section");
            let meseAttualeVisualizzato = "Novembre";
            
            for (let section of sections) {
                let rect = section.getBoundingClientRect();
                if (rect.top <= 250 && rect.bottom >= 250) {
                    meseAttualeVisualizzato = section.getAttribute("data-mese-nome");
                    break;
                }
            }
            document.getElementById("main-title-display").innerText = meseAttualeVisualizzato;
        }
    </script>
</body>
</html>
